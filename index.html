            { id: "ex33", category: "shoulder", sub: "어깨", name: "덤벨 벤트오버 레터럴 레이즈", items: ["양발을 약간 좁게 벌리고 무릎을 굽혀 상체를 바닥과 수평 가깝게 숙였는가?", "팔꿈치는 약간 굽힌 상태를 유지하고 제어하는가?", "과한 반동 없이 측/후면 삼각근의 고립 자세가 유지되는가?", "호흡은 올릴 때 내쉬고 내리며 들이마시는가?"] },
            { id: "ex34", category: "shoulder", sub: "어깨", name: "바벨 업라이트 로우", items: ["두 발을 어깨너비로 서서 바벨을 오버핸드 그립으로 잡았는가?", "바벨을 들어 올렸을 때 팔꿈치가 손보다 항상 위에 위치하는가?", "바벨을 가슴 중앙이나 쇄골 높이까지 들어 올리는가?", "동작 내내 등을 곧게 펴고 호흡은 올릴 때 내쉬는가?"] },

            // 복부 (Abs)
            { id: "ex35", category: "abs", sub: "복부", name: "크런치 & 리버스 크런치", items: ["바닥에 누워 무릎을 세우거나 90도로 굽혀 들었는가?", "상체를 30도 정도만 들거나(크런치) 골반을 말아 올리며 가슴 쪽으로 당기는가(리버스)?", "상체/골반을 수축해 올렸을 때 호흡을 내뱉는가?", "동작 중 허리의 과도한 부담을 제한하고 복근을 고립하는가?"] },
            { id: "ex36", category: "abs", sub: "복부", name: "레그레이즈 & 싯업", items: ["다리를 90도 가까이 올리거나(레그레이즈) 상체를 완전히 일으켜 허벅지에 닿게 하는가(싯업)?", "레그레이즈 시 다리를 내릴 때 허리가 과하게 뜨지 않도록 통제하는가?", "수축 정점에서 호흡을 내쉬고 이완할 때 들이마시는가?"] },
            { id: "ex37", category: "abs", sub: "복부", name: "시티드 니업 & 덤벨 사이드 밴드", items: ["벤치에 앉아 균형을 잡고 복부를 수축하며 무릎을 당기는가?", "사이드 밴드 시 척추를 측면으로 통제하며 기울였다가 옆구리를 수축해 세우는가?", "동작에 맞는 호흡을 수행하는가?"] },

            // 하체 (Legs)
            { id: "ex38", category: "legs", sub: "하체", name: "바벨 백 스쿼트 & 프런트 스쿼트", items: ["두 발은 어깨너비(또는 약간 넓게) 스탠스를 견고하게 유지하는가?", "바벨을 목적에 맞게 승모근 상부(백) 또는 쇄골과 어깨(프런트)에 지탱했는가?", "허리를 꼿꼿이 세우고 대퇴가 바닥과 수평이 될 때까지 앉았는가?", "앉을 때 무릎이 발끝 방향을 향하며 뒤꿈치가 바닥에서 뜨지 않는가?", "일어설 때 반동을 제어하고 다 일어선 후 호흡을 내쉬는가?"] },
            { id: "ex39", category: "legs", sub: "하체", name: "고블릿 & 불가리안 스플릿 스쿼트", items: ["덤벨을 가슴 앞에 고정하고 팔꿈치를 모았는가(고블릿)?", "한 발을 뒤쪽 벤치에 고정하고 양 무릎을 적절히 구부려 앉는가(불가리안)?", "양쪽 무릎이 안쪽으로 모이는 X자 다리 형태가 되지 않도록 주의하는가?", "허리가 과도하게 꺾이거나 굽지 않도록 제어하며 일어선 후 호흡을 내쉬는가?"] },
            { id: "ex40", category: "legs", sub: "하체", name: "스티프 레그 데드리프트 & 런지(바벨/덤벨)", items: ["스티프 시 가슴을 펴고 허리 중립을 유지하며 엉덩이를 뒤로 빼고 내리는가?", "런지 수행 시 앞으로 내딛는 발바닥이 고정되며 무릎이 발끝을 과하게 넘지 않는가?", "등과 허리를 곧게 편 상태로 밸런스를 유지하며 교차로 실시하는가?", "올라오는 단계에서 명확하게 호흡을 내쉬는가?"] }
        ];

        // State Management
        let checkedItems = JSON.parse(localStorage.getItem('kbbf_checked_items')) || {};
        let bookmarkedExercises = JSON.parse(localStorage.getItem('kbbf_bookmarks')) || {};
        let currentTab = 'bookmark'; // 기본 진입을 헷갈리는 자세 모음으로 세팅하여 복습 용이성 극대화

        // DOM Render
        function render() {
            const container = document.getElementById('content-container');
            container.innerHTML = '';

            // Filter logic
            let filtered = [];
            if (currentTab === 'all') {
                filtered = exerciseData;
            } else if (currentTab === 'bookmark') {
                filtered = exerciseData.filter(ex => bookmarkedExercises[ex.id]);
            } else {
                filtered = exerciseData.filter(ex => ex.category === currentTab);
            }

            // Empty state for bookmarks
            if (currentTab === 'bookmark' && filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 px-4 bg-white rounded-2xl border border-slate-200 shadow-sm">
                        <span class="text-4xl block mb-2">📌</span>
                        <p class="text-sm font-bold text-slate-500">헷갈리는 자세 카드가 비어있습니다.</p>
                        <p class="text-xs text-slate-400 mt-1">다른 탭에서 카드 우측의 핀 버튼을 눌러 추가하세요!</p>
                    </div>
                `;
                updateProgressBar();
                return;
            }

            filtered.forEach(ex => {
                const card = document.createElement('section');
                card.className = "bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden p-4 space-y-3 relative";
                
                const isBookmarked = bookmarkedExercises[ex.id] ? true : false;

                // Card Header + Bookmark Pin Button
                card.innerHTML = `
                    <div class="flex justify-between items-center pr-8">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black uppercase tracking-wider px-2 py-0.5 rounded-md ${
                                ex.category === 'back-biceps' ? 'bg-amber-100 text-amber-700' : 
                                ex.category === 'chest-triceps' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'
                            }">${ex.sub}</span>
                            <h2 class="text-sm font-bold text-slate-900">${ex.name}</h2>
                        </div>
                    </div>
                    <button onclick="toggleBookmark('${ex.id}')" class="absolute top-3.5 right-3.5 p-1 rounded-full transition-colors ${isBookmarked ? 'text-amber-500 bg-amber-50' : 'text-slate-300 bg-slate-50'}">
                        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                            <path d="M16 12V4H17V2H7V4H8V12L6 14V16H11V22L12 23L13 22V16H18V14L16 12Z"/>
                        </svg>
                    </button>
                    <div class="h-[1px] bg-slate-100 w-full"></div>
                `;

                // Checklist Items
                const ul = document.createElement('ul');
                ul.className = "space-y-2.5";

                ex.items.forEach((item, idx) => {
                    const itemId = `${ex.id}-${idx}`;
                    const isChecked = checkedItems[itemId] ? true : false;

                    const li = document.createElement('li');
                    li.className = `flex items-start gap-3 p-2.5 rounded-xl transition-all cursor-pointer ${
                        isChecked ? 'bg-slate-50 text-slate-400' : 'bg-white hover:bg-slate-50'
                    }`;
                    li.onclick = () => toggleCheck(itemId);

                    li.innerHTML = `
                        <div class="mt-0.5 shrink-0 flex items-center justify-center w-5 h-5 rounded-md border ${
                            isChecked ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300 bg-white'
                        }">
                            ${isChecked ? '<svg class="w-3.5 h-3.5 stroke-[3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                        <span class="text-xs leading-relaxed font-medium ${isChecked ? 'line-through' : 'text-slate-700'}">
                            ${item}
                        </span>
                    `;
                    ul.appendChild(li);
                });

                card.appendChild(ul);
                container.appendChild(card);
            });

            updateProgressBar();
        }

        // Actions
        function toggleCheck(id) {
            if (checkedItems[id]) {
                delete checkedItems[id];
            } else {
                checkedItems[id] = true;
            }
            localStorage.setItem('kbbf_checked_items', JSON.stringify(checkedItems));
            render();
        }

        function toggleBookmark(exId) {
            if (bookmarkedExercises[exId]) {
                delete bookmarkedExercises[exId];
            } else {
                bookmarkedExercises[exId] = true;
            }
            localStorage.setItem('kbbf_bookmarks', JSON.stringify(bookmarkedExercises));
            render();
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.getAttribute('data-tab') === tabId) {
                    if(tabId === 'bookmark') {
                        btn.className = "tab-btn shrink-0 text-xs font-black px-4 py-2.5 rounded-full bg-amber-500 text-white shadow-sm transition-all";
                    } else {
                        btn.className = "tab-btn shrink-0 text-xs font-bold px-4 py-2.5 rounded-full bg-indigo-600 text-white shadow-sm transition-all";
                    }
                } else {
                    if(btn.getAttribute('data-tab') === 'bookmark') {
                        btn.className = "tab-btn shrink-0 text-xs font-black px-4 py-2.5 rounded-full bg-amber-50 text-amber-600 border border-amber-200 transition-all";
                    } else {
                        btn.className = "tab-btn shrink-0 text-xs font-bold px-4 py-2.5 rounded-full bg-white text-slate-600 border border-slate-200 transition-all";
                    }
                }
            });
            render();
        }

        function updateProgressBar() {
            let totalItems = 0;
            exerciseData.forEach(ex => totalItems += ex.items.length);
            
            let checkedCount = 0;
            exerciseData.forEach(ex => {
                ex.items.forEach((_, idx) => {
                    if (checkedItems[`${ex.id}-${idx}`]) checkedCount++;
                });
            });

            const percent = totalItems > 0 ? Math.round((checkedCount / totalItems) * 100) : 0;
            document.getElementById('main-progress').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `${percent}% (${checkedCount}/${totalItems})`;
        }

        function resetAllProgress() {
            if (confirm('심사 체크 및 📌북마크 내역을 전부 초기화할까요?')) {
                checkedItems = {};
                bookmarkedExercises = {};
                localStorage.removeItem('kbbf_checked_items');
                localStorage.removeItem('kbbf_bookmarks');
                render();
            }
        }

        // Init Layout Button Style Ajustment
        switchTab('bookmark');
    </script>
</body>
